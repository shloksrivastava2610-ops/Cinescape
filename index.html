<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineScape</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">🎬 CineScape</div>
        <nav>
            <button class="nav-btn active" onclick="switchTab('movies')">Movies</button>
            <button class="nav-btn" onclick="switchTab('series')">Series</button>
            <button class="nav-btn" onclick="switchTab('favourites')">❤️ Favourites</button>
        </nav>
    </header>

    <div class="controls">
        <input 
            type="text" 
            id="search-input" 
            placeholder="🔍 Search movies or series..."
        />
        <select id="genre-filter">
            <option value="">All Genres</option>
            <option value="28">Action</option>
            <option value="35">Comedy</option>
            <option value="27">Horror</option>
            <option value="10749">Romance</option>
            <option value="878">Sci-Fi</option>
            <option value="16">Animation</option>
            <option value="18">Drama</option>
            <option value="53">Thriller</option>
        </select>
        <select id="sort-filter">
            <option value="">Sort By</option>
            <option value="rating-high"> Rating: High to Low</option>
            <option value="rating-low"> Rating: Low to High</option>
            <option value="date-new">Newest First</option>
            <option value="date-old"> Oldest First</option>
            <option value="alpha-asc"> A - Z</option>
            <option value="alpha-desc"> Z - A</option>
        </select>
    </div>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <main>
        <section id="movies-section">
            <h2> Trending Movies</h2>
            <div id="movies-container" class="grid"></div>
        </section>

        <section id="series-section" style="display:none">
            <h2> Trending Series</h2>
            <div id="series-container" class="grid"></div>
        </section>

        <section id="favourites-section" style="display:none">
            <h2> My Favourites</h2>
            <div id="favourites-container" class="grid"></div>
        </section>
    </main>

    <div id="bottom-loader">
        <div class="spinner"></div>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>

</body>
</html>
